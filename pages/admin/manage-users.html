<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DalaChap - Manage Users</title>
    <link rel="stylesheet" href="../../dalachap_dashboard/assets/css/style.css">
    <link rel="stylesheet" href="../../dalachap_dashboard/assets/css/dashboard.css">
</head>
<body>
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header"><h3>🚌 DalaChap</h3></div>
        <nav class="sidebar-nav">
            <a href="admin-dashboard.html" class="sidebar-nav-item"><i>📊</i> <span>Dashboard</span></a>
            <a href="manage-users.html" class="sidebar-nav-item active"><i>👥</i> <span>Manage Users</span></a>
            <a href="manage-routes.html" class="sidebar-nav-item"><i>🛣️</i> <span>Manage Routes</span></a>
            <a href="manage-vehicles.html" class="sidebar-nav-item"><i>🚐</i> <span>Manage Vehicles</span></a>
            <a href="manage-associations.html" class="sidebar-nav-item"><i>🏢</i> <span>Associations</span></a>
            <a href="register-association.html" class="sidebar-nav-item"><i>➕</i> <span>Register Association</span></a>
            <a href="#" class="sidebar-nav-item" id="logout-btn"><i>🚪</i> <span>Logout</span></a>
        </nav>
    </div>

    <div class="main-content">
        <div class="top-header">
            <button class="menu-toggle" id="sidebar-toggle">☰</button>
            <div class="header-right">
                <div class="notification-icon">🔔<span class="notification-badge" id="notification-badge">0</span></div>
                <div class="user-profile"><div class="user-avatar" id="user-avatar">A</div></div>
            </div>
        </div>

        <div class="content-area">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <h1 class="page-title">Manage Users</h1>
                <button class="btn btn-primary" onclick="openAddUserModal()">➕ Add New User</button>
            </div>

            <!-- Filters -->
            <div class="card">
                <div style="display: flex; gap: 15px; flex-wrap: wrap;">
                    <select id="role-filter" onchange="loadUsers()" style="padding: 8px; border-radius: 8px;">
                        <option value="">All Roles</option>
                        <option value="admin">Admin</option>
                        <option value="traffic_officer">Traffic Officer</option>
                        <option value="association_leader">Association Leader</option>
                        <option value="driver">Driver</option>
                        <option value="passenger">Passenger</option>
                    </select>
                    <select id="status-filter" onchange="loadUsers()" style="padding: 8px; border-radius: 8px;">
                        <option value="">All Status</option>
                        <option value="1">Active</option>
                        <option value="0">Inactive</option>
                    </select>
                    <input type="text" id="search-input" placeholder="Search by name or email..." style="padding: 8px; border-radius: 8px; width: 250px;">
                    <button class="btn btn-primary" onclick="loadUsers()">Search</button>
                </div>
            </div>

            <!-- Users Table -->
            <div class="card">
                <div id="users-container">
                    <div class="loading-spinner">Loading users...</div>
                </div>
            </div>
        </div>
    </div>

    <!-- Add/Edit User Modal -->
    <div id="user-modal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; justify-content: center; align-items: center;">
        <div style="background: white; border-radius: 12px; max-width: 500px; width: 90%; padding: 25px;">
            <h3 id="modal-title">Add New User</h3>
            <form id="user-form">
                <input type="hidden" id="user-id">
                <div class="form-group"><label>Full Name</label><input type="text" id="full-name" required></div>
                <div class="form-group"><label>Email</label><input type="email" id="email" required></div>
                <div class="form-group"><label>Phone Number</label><input type="text" id="phone" required></div>
                <div class="form-group"><label>Role</label>
                    <select id="role" required>
                        <option value="passenger">Passenger</option>
                        <option value="driver">Driver</option>
                        <option value="association_leader">Association Leader</option>
                        <option value="traffic_officer">Traffic Officer</option>
                        <option value="admin">Admin</option>
                    </select>
                </div>
                <div class="form-group" id="password-group"><label>Password</label><input type="password" id="password" placeholder="Leave blank to keep current"></div>
                <div class="form-group"><label>Status</label>
                    <select id="status">
                        <option value="1">Active</option>
                        <option value="0">Inactive</option>
                    </select>
                </div>
                <div style="display: flex; gap: 10px; justify-content: flex-end;">
                    <button type="button" class="btn" onclick="closeModal()">Cancel</button>
                    <button type="submit" class="btn btn-primary">Save</button>
                </div>
            </form>
        </div>
    </div>

    <div id="toast-container"></div>

    <script src="../../dalachap_dashboard/assets/js/config.js?v=2"></script>
    <script src="../../dalachap_dashboard/assets/js/auth.js?v=2"></script>
    <script src="../../dalachap_dashboard/assets/js/common.js?v=2"></script>
    
    <script>
        let currentEditId = null;
        
        document.addEventListener('DOMContentLoaded', () => {
            requireRole(['admin']);
            initCommon();
            loadUsers();
        });
        
        async function loadUsers() {
            const role = document.getElementById('role-filter').value;
            const status = document.getElementById('status-filter').value;
            const search = document.getElementById('search-input').value;
            
            let url = API_ENDPOINTS.getUsers;
            let params = [];
            if (role) params.push(`role=${role}`);
            if (status) params.push(`status=${status}`);
            if (search) params.push(`search=${encodeURIComponent(search)}`);
            if (params.length) url += '?' + params.join('&');
            
            const result = await apiRequest(url);
            
            if (result.success && result.data.users) {
                let html = '<table class="data-table"><thead><tr><th>Name</th><th>Email</th><th>Phone</th><th>Role</th><th>Status</th><th>Actions</th></tr></thead><tbody>';
                for (const user of result.data.users) {
                    const statusClass = user.is_active ? 'status-active' : 'status-inactive';
                    const statusText = user.is_active ? 'Active' : 'Inactive';
                    let roleDisplay = user.role.replace('_', ' ').toUpperCase();
                    
                    html += `
                        <tr>
                            <td>${user.full_name}</td>
                            <td>${user.email}</td>
                            <td>${user.phone_number}</td>
                            <td><span class="status-badge">${roleDisplay}</span></td>
                            <td><span class="status-badge ${statusClass}">${statusText}</span></td>
                            <td>
                                <button class="btn btn-sm" onclick="editUser(${user.user_id})">✏️ Edit</button>
                                <button class="btn btn-sm btn-danger" onclick="deleteUser(${user.user_id})">🗑️ Delete</button>
                            </td>
                        </tr>
                    `;
                }
                html += '</tbody></table>';
                document.getElementById('users-container').innerHTML = html;
            } else {
                document.getElementById('users-container').innerHTML = '<div class="loading-spinner">No users found</div>';
            }
        }
        
        function openAddUserModal() {
            currentEditId = null;
            document.getElementById('modal-title').textContent = 'Add New User';
            document.getElementById('user-form').reset();
            document.getElementById('user-id').value = '';
            document.getElementById('password-group').style.display = 'block';
            document.getElementById('user-modal').style.display = 'flex';
        }
        
        async function editUser(userId) {
            const result = await apiRequest(`${API_ENDPOINTS.getUsers}?user_id=${userId}`);
            if (result.success && result.data.user) {
                const user = result.data.user;
                currentEditId = userId;
                document.getElementById('modal-title').textContent = 'Edit User';
                document.getElementById('user-id').value = user.user_id;
                document.getElementById('full-name').value = user.full_name;
                document.getElementById('email').value = user.email;
                document.getElementById('phone').value = user.phone_number;
                document.getElementById('role').value = user.role;
                document.getElementById('status').value = user.is_active;
                document.getElementById('password-group').style.display = 'none';
                document.getElementById('user-modal').style.display = 'flex';
            }
        }
        
        document.getElementById('user-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const data = {
                full_name: document.getElementById('full-name').value,
                email: document.getElementById('email').value,
                phone: document.getElementById('phone').value,
                role: document.getElementById('role').value,
                status: parseInt(document.getElementById('status').value)
            };
            
            if (currentEditId) {
                data.user_id = currentEditId;
                const result = await apiRequest(API_ENDPOINTS.updateUser, 'POST', data);
                if (result.success) {
                    showToast('User updated successfully', 'success');
                    closeModal();
                    loadUsers();
                } else {
                    showToast(result.message, 'error');
                }
            } else {
                data.password = document.getElementById('password').value;
                const result = await apiRequest(API_ENDPOINTS.addUser, 'POST', data);
                if (result.success) {
                    showToast('User added successfully', 'success');
                    closeModal();
                    loadUsers();
                } else {
                    showToast(result.message, 'error');
                }
            }
        });
        
        async function deleteUser(userId) {
            if (confirm('Are you sure you want to delete this user?')) {
                const result = await apiRequest(API_ENDPOINTS.deleteUser, 'POST', { user_id: userId });
                if (result.success) {
                    showToast('User deleted successfully', 'success');
                    loadUsers();
                } else {
                    showToast(result.message, 'error');
                }
            }
        }
        
        function closeModal() {
            document.getElementById('user-modal').style.display = 'none';
        }
    </script>
</body>
</html>
