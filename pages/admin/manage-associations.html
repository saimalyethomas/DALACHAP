<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DalaChap - Manage Associations</title>
    <link rel="stylesheet" href="../../dalachap_dashboard/assets/css/style.css">
    <link rel="stylesheet" href="../../dalachap_dashboard/assets/css/dashboard.css">
    <link rel="stylesheet" href="../../dalachap_dashboard/assets/css/mobile-responsive.css">
</head>
<body>
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header"><h3>🚌 DalaChap</h3></div>
        <nav class="sidebar-nav">
            <a href="admin-dashboard.html" class="sidebar-nav-item"><i>📊</i> <span>Dashboard</span></a>
            <a href="manage-users.html" class="sidebar-nav-item"><i>👥</i> <span>Manage Users</span></a>
            <a href="manage-routes.html" class="sidebar-nav-item"><i>🛣️</i> <span>Manage Routes</span></a>
            <a href="manage-vehicles.html" class="sidebar-nav-item"><i>🚐</i> <span>Manage Vehicles</span></a>
            <a href="manage-associations.html" class="sidebar-nav-item active"><i>🏢</i> <span>Associations</span></a>
            <a href="register-association.html" class="sidebar-nav-item"><i>➕</i> <span>Register Association</span></a>
            <a href="system-logs.html" class="sidebar-nav-item"><i>📜</i> <span>System Logs</span></a>
            <a href="#" class="sidebar-nav-item" id="logout-btn"><i>🚪</i> <span>Logout</span></a>
        </nav>
    </div>

    <div class="main-content">
        <div class="top-header">
            <button class="menu-toggle" id="sidebar-toggle">☰</button>
            <div class="header-right">
                <div class="notification-icon">🔔<span class="notification-badge" id="notification-badge">0</span>
                    <div class="notification-dropdown" id="notifications-dropdown"></div>
                </div>
                <div class="user-profile"><div class="user-avatar" id="user-avatar">A</div></div>
            </div>
        </div>

        <div class="content-area">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <h1 class="page-title">Manage Associations</h1>
                <button class="btn btn-primary" onclick="openAddAssociationModal()">➕ Add Association</button>
            </div>

            <div class="card">
                <div class="table-responsive">
                    <div id="associations-container">
                        <div class="loading-spinner">Loading associations...</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Add/Edit Association Modal -->
    <div id="association-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modal-title">Add Association</h3>
                <button class="modal-close" onclick="closeModal()">&times;</button>
            </div>
            <form id="association-form">
                <input type="hidden" id="association-id">
                <div class="form-group"><label>Association Name *</label><input type="text" id="association-name" required></div>
                <div class="form-group"><label>Registration Number *</label><input type="text" id="registration-number" required></div>
                <div class="form-group"><label>Phone Number *</label><input type="tel" id="phone" required></div>
                <div class="form-group"><label>Email</label><input type="email" id="email"></div>
                <div class="form-group"><label>Chairman Name</label><input type="text" id="chairman-name"></div>
                <div class="form-group"><label>Address</label><textarea id="address" rows="2"></textarea></div>
                <div class="form-group"><label>Status</label>
                    <select id="status">
                        <option value="active">Active</option>
                        <option value="inactive">Inactive</option>
                    </select>
                </div>
                <div style="display: flex; gap: 10px; justify-content: flex-end;">
                    <button type="button" class="btn" onclick="closeModal()">Cancel</button>
                    <button type="submit" class="btn btn-primary">Save Association</button>
                </div>
            </form>
        </div>
    </div>

    <div id="toast-container"></div>

    <script src="../../dalachap_dashboard/assets/js/config.js?v=2"></script>
    <script src="../../dalachap_dashboard/assets/js/auth.js?v=2"></script>
    <script src="../../dalachap_dashboard/assets/js/common.js?v=2"></script>
    
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            if (!requireRole(['admin'])) return;
            initCommon();
            loadAssociations();
        });

        async function loadAssociations() {
            const result = await apiRequest(API_ENDPOINTS.getAssociations);
            
            if (result.success && result.data.associations) {
                let html = '<table class="data-table"><thead><tr><th>Name</th><th>Reg No</th><th>Phone</th><th>Chairman</th><th>Vehicles</th><th>Status</th><th>Actions</th></tr></thead><tbody>';
                
                for (const assoc of result.data.associations) {
                    const statusClass = assoc.status === 'active' ? 'badge-success' : 'badge-danger';
                    html += `
                        <tr>
                            <td><strong>${assoc.association_name}</strong></td>
                            <td>${assoc.registration_number}</td>
                            <td>${assoc.phone_number}</td>
                            <td>${assoc.chairman_name || '-'}</td>
                            <td>${assoc.vehicle_count || 0}</td>
                            <td><span class="badge ${statusClass}">${assoc.status}</span></td>
                            <td>
                                <button class="btn btn-sm" onclick="editAssociation(${assoc.association_id})">✏️</button>
                                <button class="btn btn-sm btn-danger" onclick="deleteAssociation(${assoc.association_id})">🗑️</button>
                            </td>
                        </tr>
                    `;
                }
                html += '</tbody></table>';
                document.getElementById('associations-container').innerHTML = html || '<div>No associations found</div>';
            } else {
                document.getElementById('associations-container').innerHTML = '<div class="loading-spinner">No associations found</div>';
            }
        }

        function openAddAssociationModal() {
            document.getElementById('modal-title').textContent = 'Add Association';
            document.getElementById('association-form').reset();
            document.getElementById('association-id').value = '';
            document.getElementById('association-modal').style.display = 'flex';
        }

        async function editAssociation(associationId) {
            const result = await apiRequest(`${API_ENDPOINTS.getAssociations}?association_id=${associationId}`);
            if (result.success && result.data.association) {
                const a = result.data.association;
                document.getElementById('modal-title').textContent = 'Edit Association';
                document.getElementById('association-id').value = a.association_id;
                document.getElementById('association-name').value = a.association_name;
                document.getElementById('registration-number').value = a.registration_number;
                document.getElementById('phone').value = a.phone_number;
                document.getElementById('email').value = a.email || '';
                document.getElementById('chairman-name').value = a.chairman_name || '';
                document.getElementById('address').value = a.address || '';
                document.getElementById('status').value = a.status;
                document.getElementById('association-modal').style.display = 'flex';
            }
        }

        async function deleteAssociation(associationId) {
            if (confirm('Are you sure you want to delete this association? This will also affect related vehicles.')) {
                const result = await apiRequest(API_ENDPOINTS.deleteAssociation, 'POST', { association_id: associationId });
                if (result.success) {
                    showToast('Association deleted successfully', 'success');
                    loadAssociations();
                } else {
                    showToast(result.message, 'error');
                }
            }
        }

        document.getElementById('association-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const data = {
                association_name: document.getElementById('association-name').value,
                registration_number: document.getElementById('registration-number').value,
                phone_number: document.getElementById('phone').value,
                email: document.getElementById('email').value,
                chairman_name: document.getElementById('chairman-name').value,
                address: document.getElementById('address').value,
                status: document.getElementById('status').value
            };
            
            const associationId = document.getElementById('association-id').value;
            let result;
            
            if (associationId) {
                data.association_id = associationId;
                result = await apiRequest(API_ENDPOINTS.updateAssociation, 'POST', data);
            } else {
                result = await apiRequest(API_ENDPOINTS.addAssociation, 'POST', data);
            }
            
            if (result.success) {
                showToast(associationId ? 'Association updated successfully' : 'Association added successfully', 'success');
                closeModal();
                loadAssociations();
            } else {
                showToast(result.message, 'error');
            }
        });

        function closeModal() {
            document.getElementById('association-modal').style.display = 'none';
        }
    </script>
</body>
</html>
