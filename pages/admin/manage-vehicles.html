<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DalaChap - Manage Vehicles</title>
    <link rel="stylesheet" href="../../dalachap_dashboard/assets/css/style.css">
    <link rel="stylesheet" href="../../dalachap_dashboard/assets/css/dashboard.css">
    <link rel="stylesheet" href="../../dalachap_dashboard/assets/css/mobile-responsive.css">
</head>
<body>
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header"><h3>🚌 DalaChap</h3></div>
        <nav class="sidebar-nav">
            <a href="admin-dashboard.html" class="sidebar-nav-item"><i>📊</i> <span>Dashboard</span></a>
            <a href="manage-users.html" class="sidebar-nav-item"><i>👥</i> <span>Manage Users</span></a>
            <a href="manage-routes.html" class="sidebar-nav-item"><i>🛣️</i> <span>Manage Routes</span></a>
            <a href="manage-vehicles.html" class="sidebar-nav-item active"><i>🚐</i> <span>Manage Vehicles</span></a>
            <a href="manage-associations.html" class="sidebar-nav-item"><i>🏢</i> <span>Associations</span></a>
            <a href="register-association.html" class="sidebar-nav-item"><i>➕</i> <span>Register Association</span></a>
            <a href="system-logs.html" class="sidebar-nav-item"><i>📜</i> <span>System Logs</span></a>
            <a href="#" class="sidebar-nav-item" id="logout-btn"><i>🚪</i> <span>Logout</span></a>
        </nav>
    </div>

    <div class="main-content">
        <div class="top-header">
            <button class="menu-toggle" id="sidebar-toggle">☰</button>
            <div class="header-right">
                <div class="notification-icon">🔔<span class="notification-badge" id="notification-badge">0</span>
                    <div class="notification-dropdown" id="notifications-dropdown"></div>
                </div>
                <div class="user-profile"><div class="user-avatar" id="user-avatar">A</div></div>
            </div>
        </div>

        <div class="content-area">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <h1 class="page-title">Manage Vehicles</h1>
                <button class="btn btn-primary" onclick="openAddVehicleModal()">➕ Register New Vehicle</button>
            </div>

            <!-- Filters -->
            <div class="card">
                <div style="display: flex; gap: 15px; flex-wrap: wrap; align-items: center;">
                    <select id="status-filter" onchange="loadVehicles()" style="padding: 8px; border-radius: 8px;">
                        <option value="all">All Vehicles</option>
                        <option value="active">Active</option>
                        <option value="inactive">Inactive</option>
                        <option value="maintenance">Maintenance</option>
                    </select>
                    <select id="association-filter" onchange="loadVehicles()" style="padding: 8px; border-radius: 8px;">
                        <option value="">All Associations</option>
                    </select>
                    <input type="text" id="search-input" placeholder="Search by registration..." style="padding: 8px; border-radius: 8px; width: 250px;">
                    <button class="btn btn-primary" onclick="loadVehicles()">Search</button>
                </div>
            </div>

            <!-- Vehicles Table -->
            <div class="card">
                <div class="table-responsive">
                    <div id="vehicles-container">
                        <div class="loading-spinner">Loading vehicles...</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Add/Edit Vehicle Modal -->
    <div id="vehicle-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modal-title">Register New Vehicle</h3>
                <button class="modal-close" onclick="closeModal()">&times;</button>
            </div>
            <form id="vehicle-form">
                <input type="hidden" id="vehicle-id">
                <div class="form-group"><label>Registration Number *</label><input type="text" id="registration-number" required placeholder="T123ABC"></div>
                <div class="form-group"><label>Owner Name *</label><input type="text" id="owner-name" required></div>
                <div class="form-group"><label>Owner Phone *</label><input type="tel" id="owner-phone" required></div>
                <div class="form-group"><label>Capacity (seats) *</label><input type="number" id="capacity" value="30" required></div>
                <div class="form-group"><label>Association</label>
                    <select id="association-id"><option value="">Independent</option></select>
                </div>
                <div class="form-group"><label>Status</label>
                    <select id="status">
                        <option value="active">Active</option>
                        <option value="inactive">Inactive</option>
                        <option value="maintenance">Maintenance</option>
                    </select>
                </div>
                <div style="display: flex; gap: 10px; justify-content: flex-end;">
                    <button type="button" class="btn" onclick="closeModal()">Cancel</button>
                    <button type="submit" class="btn btn-primary">Save Vehicle</button>
                </div>
            </form>
        </div>
    </div>

    <div id="toast-container"></div>

    <script src="../../dalachap_dashboard/assets/js/config.js?v=2"></script>
    <script src="../../dalachap_dashboard/assets/js/auth.js?v=2"></script>
    <script src="../../dalachap_dashboard/assets/js/common.js?v=2"></script>
    
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            if (!requireRole(['admin'])) return;
            initCommon();
            loadAssociationsForFilter();
            loadAssociationsForModal();
            loadVehicles();
        });

        async function loadAssociationsForFilter() {
            const result = await apiRequest(API_ENDPOINTS.getAssociations);
            if (result.success && result.data.associations) {
                const select = document.getElementById('association-filter');
                for (const assoc of result.data.associations) {
                    const option = document.createElement('option');
                    option.value = assoc.association_id;
                    option.textContent = assoc.association_name;
                    select.appendChild(option);
                }
            }
        }

        async function loadAssociationsForModal() {
            const result = await apiRequest(API_ENDPOINTS.getAssociations);
            if (result.success && result.data.associations) {
                const select = document.getElementById('association-id');
                for (const assoc of result.data.associations) {
                    const option = document.createElement('option');
                    option.value = assoc.association_id;
                    option.textContent = assoc.association_name;
                    select.appendChild(option);
                }
            }
        }

        async function loadVehicles() {
            const status = document.getElementById('status-filter').value;
            const association = document.getElementById('association-filter').value;
            const search = document.getElementById('search-input').value;
            
            let url = API_ENDPOINTS.getVehicles + '?all=true';
            if (status !== 'all') url += '&status=' + status;
            if (association) url += '&association_id=' + association;
            if (search) url += '&search=' + encodeURIComponent(search);
            
            const result = await apiRequest(url);
            
            if (result.success && result.data.vehicles) {
                let html = '<table class="data-table"><thead><tr><th>Reg Number</th><th>Owner</th><th>Phone</th><th>Association</th><th>Capacity</th><th>Status</th><th>Actions</th></tr></thead><tbody>';
                
                for (const vehicle of result.data.vehicles) {
                    const statusClass = vehicle.status === 'active' ? 'badge-success' : (vehicle.status === 'maintenance' ? 'badge-warning' : 'badge-danger');
                    html += `
                        <tr>
                            <td><strong>${vehicle.registration_number}</strong></td>
                            <td>${vehicle.owner_name}</td>
                            <td>${vehicle.owner_phone}</td>
                            <td>${vehicle.association_name || '-'}</td>
                            <td>${vehicle.capacity}</td>
                            <td><span class="badge ${statusClass}">${vehicle.status}</span></td>
                            <td>
                                <button class="btn btn-sm" onclick="editVehicle(${vehicle.vehicle_id})">✏️</button>
                                <button class="btn btn-sm btn-danger" onclick="deleteVehicle(${vehicle.vehicle_id})">🗑️</button>
                            </td>
                        </tr>
                    `;
                }
                html += '</tbody></table>';
                document.getElementById('vehicles-container').innerHTML = html || '<div>No vehicles found</div>';
            } else {
                document.getElementById('vehicles-container').innerHTML = '<div class="loading-spinner">No vehicles found</div>';
            }
        }

        function openAddVehicleModal() {
            document.getElementById('modal-title').textContent = 'Register New Vehicle';
            document.getElementById('vehicle-form').reset();
            document.getElementById('vehicle-id').value = '';
            document.getElementById('association-id').value = '';
            document.getElementById('capacity').value = '30';
            document.getElementById('vehicle-modal').style.display = 'flex';
        }

        async function editVehicle(vehicleId) {
            const result = await apiRequest(`${API_ENDPOINTS.getVehicles}?vehicle_id=${vehicleId}`);
            if (result.success && result.data.vehicle) {
                const v = result.data.vehicle;
                document.getElementById('modal-title').textContent = 'Edit Vehicle';
                document.getElementById('vehicle-id').value = v.vehicle_id;
                document.getElementById('registration-number').value = v.registration_number;
                document.getElementById('owner-name').value = v.owner_name;
                document.getElementById('owner-phone').value = v.owner_phone;
                document.getElementById('capacity').value = v.capacity;
                document.getElementById('association-id').value = v.association_id || '';
                document.getElementById('status').value = v.status;
                document.getElementById('vehicle-modal').style.display = 'flex';
            }
        }

        async function deleteVehicle(vehicleId) {
            if (confirm('Are you sure you want to delete this vehicle?')) {
                const result = await apiRequest(API_ENDPOINTS.deleteVehicle, 'POST', { vehicle_id: vehicleId });
                if (result.success) {
                    showToast('Vehicle deleted successfully', 'success');
                    loadVehicles();
                } else {
                    showToast(result.message, 'error');
                }
            }
        }

        document.getElementById('vehicle-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const vehicleData = {
                registration_number: document.getElementById('registration-number').value,
                owner_name: document.getElementById('owner-name').value,
                owner_phone: document.getElementById('owner-phone').value,
                capacity: parseInt(document.getElementById('capacity').value),
                association_id: document.getElementById('association-id').value || null,
                status: document.getElementById('status').value
            };
            
            const vehicleId = document.getElementById('vehicle-id').value;
            let result;
            
            if (vehicleId) {
                vehicleData.vehicle_id = vehicleId;
                result = await apiRequest(API_ENDPOINTS.updateVehicle, 'POST', vehicleData);
            } else {
                result = await apiRequest(API_ENDPOINTS.addVehicle, 'POST', vehicleData);
            }
            
            if (result.success) {
                showToast(vehicleId ? 'Vehicle updated successfully' : 'Vehicle registered successfully', 'success');
                closeModal();
                loadVehicles();
            } else {
                showToast(result.message, 'error');
            }
        });

        function closeModal() {
            document.getElementById('vehicle-modal').style.display = 'none';
        }
    </script>
</body>
</html>
