<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DalaChap - Register Association</title>
    <link rel="stylesheet" href="../../dalachap_dashboard/assets/css/style.css">
    <link rel="stylesheet" href="../../dalachap_dashboard/assets/css/dashboard.css">
    <link rel="stylesheet" href="../../dalachap_dashboard/assets/css/mobile-responsive.css">
</head>
<body>
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header"><h3>🚌 DalaChap</h3></div>
        <nav class="sidebar-nav">
            <a href="admin-dashboard.html" class="sidebar-nav-item"><i>📊</i> <span>Dashboard</span></a>
            <a href="manage-users.html" class="sidebar-nav-item"><i>👥</i> <span>Manage Users</span></a>
            <a href="manage-routes.html" class="sidebar-nav-item"><i>🛣️</i> <span>Manage Routes</span></a>
            <a href="manage-vehicles.html" class="sidebar-nav-item"><i>🚐</i> <span>Manage Vehicles</span></a>
            <a href="manage-associations.html" class="sidebar-nav-item"><i>🏢</i> <span>Associations</span></a>
            <a href="register-association.html" class="sidebar-nav-item active"><i>➕</i> <span>Register Association</span></a>
            <a href="system-logs.html" class="sidebar-nav-item"><i>📜</i> <span>System Logs</span></a>
            <a href="#" class="sidebar-nav-item" id="logout-btn"><i>🚪</i> <span>Logout</span></a>
        </nav>
    </div>

    <div class="main-content">
        <div class="top-header">
            <button class="menu-toggle" id="sidebar-toggle">☰</button>
            <div class="header-right">
                <div class="notification-icon">🔔<span class="notification-badge" id="notification-badge">0</span>
                    <div class="notification-dropdown" id="notifications-dropdown"></div>
                </div>
                <div class="user-profile"><div class="user-avatar" id="user-avatar">A</div></div>
            </div>
        </div>

        <div class="content-area">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <h1 class="page-title">Register New Association</h1>
                <a href="manage-associations.html" class="btn">← Back to Associations</a>
            </div>

            <div class="card" style="max-width: 700px;">
                <form id="register-association-form">
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                        <div class="form-group">
                            <label>Association Name *</label>
                            <input type="text" id="association-name" placeholder="e.g. Dar Rapid Transit Association" required>
                        </div>
                        <div class="form-group">
                            <label>Registration Number *</label>
                            <input type="text" id="registration-number" placeholder="e.g. DRTA001" required>
                        </div>
                        <div class="form-group">
                            <label>Phone Number *</label>
                            <input type="tel" id="phone" placeholder="e.g. 0712345678" required>
                        </div>
                        <div class="form-group">
                            <label>Email</label>
                            <input type="email" id="email" placeholder="e.g. info@association.co.tz">
                        </div>
                        <div class="form-group">
                            <label>Chairman Name</label>
                            <input type="text" id="chairman-name" placeholder="e.g. Mr. Hassan Juma">
                        </div>
                        <div class="form-group">
                            <label>Status</label>
                            <select id="status">
                                <option value="active">Active</option>
                                <option value="inactive">Inactive</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-group" style="margin-top: 15px;">
                        <label>Address</label>
                        <textarea id="address" rows="3" placeholder="Enter association address..."></textarea>
                    </div>
                    <div style="display: flex; gap: 10px; margin-top: 20px;">
                        <button type="submit" class="btn btn-primary">🏢 Register Association</button>
                        <button type="reset" class="btn">Clear Form</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <div id="toast-container"></div>

    <script src="../../dalachap_dashboard/assets/js/config.js?v=2"></script>
    <script src="../../dalachap_dashboard/assets/js/auth.js?v=2"></script>
    <script src="../../dalachap_dashboard/assets/js/common.js?v=2"></script>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            if (!requireRole(['admin'])) return;
            initCommon();
        });

        document.getElementById('register-association-form').addEventListener('submit', async (e) => {
            e.preventDefault();

            const data = {
                association_name: document.getElementById('association-name').value.trim(),
                registration_number: document.getElementById('registration-number').value.trim(),
                phone_number: document.getElementById('phone').value.trim(),
                email: document.getElementById('email').value.trim(),
                chairman_name: document.getElementById('chairman-name').value.trim(),
                address: document.getElementById('address').value.trim(),
                status: document.getElementById('status').value
            };

            const result = await apiRequest(API_ENDPOINTS.addAssociation, 'POST', data);

            if (result.success) {
                showToast('Association registered successfully!', 'success');
                document.getElementById('register-association-form').reset();
                setTimeout(() => {
                    window.location.href = 'manage-associations.html';
                }, 1500);
            } else {
                showToast(result.message || 'Failed to register association', 'error');
            }
        });
    </script>
</body>
</html>
