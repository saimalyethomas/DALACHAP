<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DalaChap - Manage Drivers</title>
    <link rel="stylesheet" href="../../dalachap_dashboard/assets/css/style.css">
    <link rel="stylesheet" href="../../dalachap_dashboard/assets/css/dashboard.css">
    <link rel="stylesheet" href="../../dalachap_dashboard/assets/css/mobile-responsive.css">
</head>
<body>
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header"><h3>🚌 DalaChap</h3></div>
        <nav class="sidebar-nav">
            <a href="association-dashbord.html" class="sidebar-nav-item"><i>📊</i> <span>Dashboard</span></a>
            <a href="my-vehicles.html" class="sidebar-nav-item"><i>🚐</i> <span>My Vehicles</span></a>
            <a href="drivers.html" class="sidebar-nav-item active"><i>👨‍✈️</i> <span>Drivers</span></a>
            <a href="register-driver.html" class="sidebar-nav-item"><i>➕</i> <span>Register Driver</span></a>
            <a href="trip-history.html" class="sidebar-nav-item"><i>📅</i> <span>Trip History</span></a>
            <a href="reports.html" class="sidebar-nav-item"><i>📊</i> <span>Reports</span></a>
            <a href="#" class="sidebar-nav-item" id="logout-btn"><i>🚪</i> <span>Logout</span></a>
        </nav>
    </div>

    <div class="main-content">
        <div class="top-header">
            <button class="menu-toggle" id="sidebar-toggle">☰</button>
            <div class="header-right">
                <div class="notification-icon">🔔<span class="notification-badge" id="notification-badge">0</span>
                    <div class="notification-dropdown" id="notifications-dropdown"></div>
                </div>
                <div class="user-profile"><div class="user-avatar" id="user-avatar">A</div></div>
            </div>
        </div>

        <div class="content-area">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <h1 class="page-title">Manage Drivers</h1>
                <button class="btn btn-primary" onclick="openAddDriverModal()">➕ Add Driver</button>
            </div>

            <div class="card">
                <div class="table-responsive">
                    <div id="drivers-container">
                        <div class="loading-spinner">Loading drivers...</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Add/Edit Driver Modal -->
    <div id="driver-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modal-title">Add Driver</h3>
                <button class="modal-close" onclick="closeModal()">&times;</button>
            </div>
            <form id="driver-form">
                <input type="hidden" id="driver-id">
                <div class="form-group"><label>Full Name *</label><input type="text" id="full-name" required></div>
                <div class="form-group"><label>Email *</label><input type="email" id="email" required></div>
                <div class="form-group"><label>Phone Number *</label><input type="tel" id="phone" required></div>
                <div class="form-group" id="password-group"><label>Password *</label><input type="password" id="password" required></div>
                <div class="form-group"><label>License Number</label><input type="text" id="license-number"></div>
                <div style="display: flex; gap: 10px; justify-content: flex-end;">
                    <button type="button" class="btn" onclick="closeModal()">Cancel</button>
                    <button type="submit" class="btn btn-primary">Save Driver</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Assign Vehicle Modal -->
    <div id="assign-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Assign Vehicle to Driver</h3>
                <button class="modal-close" onclick="closeAssignModal()">&times;</button>
            </div>
            <input type="hidden" id="assign-driver-id">
            <div class="form-group"><label>Select Vehicle</label>
                <select id="assign-vehicle-select" required></select>
            </div>
            <div class="form-group"><label>Assigned Route</label>
                <select id="assign-route-select" required></select>
            </div>
            <div style="display: flex; gap: 10px; justify-content: flex-end;">
                <button class="btn" onclick="closeAssignModal()">Cancel</button>
                <button class="btn btn-primary" id="submit-assign-btn">Assign Vehicle</button>
            </div>
        </div>
    </div>

    <div id="toast-container"></div>

    <script src="../../dalachap_dashboard/assets/js/config.js?v=2"></script>
    <script src="../../dalachap_dashboard/assets/js/auth.js?v=2"></script>
    <script src="../../dalachap_dashboard/assets/js/common.js?v=2"></script>
    <script src="../../dalachap_dashboard/assets/js/association.js?v=2"></script>
    
    <script>
        let editMode = false;

        document.addEventListener('DOMContentLoaded', () => {
            if (!requireRole(['association_leader', 'admin'])) return;
            initCommon();
            loadDrivers();
        });

        async function loadDrivers() {
            const result = await apiRequest(API_ENDPOINTS.getAssociationDrivers);
            
            if (result.success && result.data.drivers) {
                let html = '<table class="data-table"><thead><tr><th>Name</th><th>Phone</th><th>Email</th><th>Assigned Vehicle</th><th>License</th><th>Status</th><th>Actions</th></tr></thead><tbody>';
                
                for (const driver of result.data.drivers) {
                    const statusClass = driver.is_active ? 'badge-success' : 'badge-danger';
                    html += `
                        <tr>
                            <td>${driver.full_name}</td>
                            <td>${driver.phone_number}</td>
                            <td>${driver.email}</td>
                            <td>${driver.assigned_vehicle || '<em>Not assigned</em>'}</td>
                            <td>${driver.license_number || '-'}</td>
                            <td><span class="badge ${statusClass}">${driver.is_active ? 'Active' : 'Inactive'}</span></td>
                            <td>
                                <button class="btn btn-sm" onclick="editDriver(${driver.user_id})">✏️</button>
                                <button class="btn btn-sm" onclick="openAssignModal(${driver.user_id})">🚐 Assign</button>
                                <button class="btn btn-sm btn-danger" onclick="removeDriver(${driver.user_id})">🗑️</button>
                            </td>
                        </tr>
                    `;
                }
                html += '</tbody></table>';
                document.getElementById('drivers-container').innerHTML = html || '<div>No drivers found</div>';
            } else {
                document.getElementById('drivers-container').innerHTML = '<div class="loading-spinner">No drivers found</div>';
            }
        }

        function openAddDriverModal() {
            editMode = false;
            document.getElementById('modal-title').textContent = 'Add Driver';
            document.getElementById('driver-form').reset();
            document.getElementById('driver-id').value = '';
            document.getElementById('password-group').style.display = 'block';
            document.getElementById('driver-modal').style.display = 'flex';
        }

        async function editDriver(driverId) {
            const result = await apiRequest(`${API_ENDPOINTS.getUsers}?user_id=${driverId}`);
            if (result.success && result.data.user) {
                editMode = true;
                const d = result.data.user;
                document.getElementById('modal-title').textContent = 'Edit Driver';
                document.getElementById('driver-id').value = d.user_id;
                document.getElementById('full-name').value = d.full_name;
                document.getElementById('email').value = d.email;
                document.getElementById('phone').value = d.phone_number;
                document.getElementById('license-number').value = d.license_number || '';
                document.getElementById('password-group').style.display = 'none';
                document.getElementById('driver-modal').style.display = 'flex';
            }
        }

        document.getElementById('driver-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const driverData = {
                full_name: document.getElementById('full-name').value,
                email: document.getElementById('email').value,
                phone: document.getElementById('phone').value,
                license_number: document.getElementById('license-number').value,
                role: 'driver'
            };
            
            const driverId = document.getElementById('driver-id').value;
            let result;
            
            if (driverId) {
                driverData.user_id = driverId;
                result = await apiRequest(API_ENDPOINTS.updateUser, 'POST', driverData);
            } else {
                driverData.password = document.getElementById('password').value;
                result = await apiRequest(API_ENDPOINTS.addUser, 'POST', driverData);
            }
            
            if (result.success) {
                showToast(driverId ? 'Driver updated successfully' : 'Driver added successfully', 'success');
                closeModal();
                loadDrivers();
            } else {
                showToast(result.message, 'error');
            }
        });

        async function openAssignModal(driverId) {
            document.getElementById('assign-driver-id').value = driverId;
            
            // Load vehicles
            const vehiclesResult = await apiRequest(API_ENDPOINTS.getAssociationVehicles);
            if (vehiclesResult.success && vehiclesResult.data.vehicles) {
                const select = document.getElementById('assign-vehicle-select');
                select.innerHTML = '<option value="">Select Vehicle</option>';
                for (const vehicle of vehiclesResult.data.vehicles) {
                    if (vehicle.status === 'active') {
                        const option = document.createElement('option');
                        option.value = vehicle.vehicle_id;
                        option.textContent = `${vehicle.registration_number} (Capacity: ${vehicle.capacity})`;
                        select.appendChild(option);
                    }
                }
            }
            
            // Load routes
            const routesResult = await apiRequest(API_ENDPOINTS.getRoutes);
            if (routesResult.success && routesResult.data.routes) {
                const select = document.getElementById('assign-route-select');
                select.innerHTML = '<option value="">Select Route</option>';
                for (const route of routesResult.data.routes) {
                    if (route.status === 'active') {
                        const option = document.createElement('option');
                        option.value = route.route_id;
                        option.textContent = route.route_name;
                        select.appendChild(option);
                    }
                }
            }
            
            document.getElementById('assign-modal').style.display = 'flex';
        }

        document.getElementById('submit-assign-btn').addEventListener('click', async () => {
            const driverId = document.getElementById('assign-driver-id').value;
            const vehicleId = document.getElementById('assign-vehicle-select').value;
            const routeId = document.getElementById('assign-route-select').value;
            
            if (!vehicleId || !routeId) {
                showToast('Please select both vehicle and route', 'error');
                return;
            }
            
            const result = await apiRequest(API_ENDPOINTS.assignDriver, 'POST', {
                driver_id: driverId,
                vehicle_id: vehicleId,
                route_id: routeId
            });
            
            if (result.success) {
                showToast('Driver assigned successfully', 'success');
                closeAssignModal();
                loadDrivers();
            } else {
                showToast(result.message, 'error');
            }
        });

        async function removeDriver(driverId) {
            if (confirm('Are you sure you want to remove this driver?')) {
                const result = await apiRequest(API_ENDPOINTS.deleteUser, 'POST', { user_id: driverId });
                if (result.success) {
                    showToast('Driver removed successfully', 'success');
                    loadDrivers();
                } else {
                    showToast(result.message, 'error');
                }
            }
        }

        function closeModal() {
            document.getElementById('driver-modal').style.display = 'none';
        }

        function closeAssignModal() {
            document.getElementById('assign-modal').style.display = 'none';
        }
    </script>
</body>
</html>
