<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DalaChap - My Vehicles</title>
    <link rel="stylesheet" href="../../dalachap_dashboard/assets/css/style.css">
    <link rel="stylesheet" href="../../dalachap_dashboard/assets/css/dashboard.css">
    <link rel="stylesheet" href="../../dalachap_dashboard/assets/css/mobile-responsive.css">
</head>
<body>
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header"><h3>🚌 DalaChap</h3></div>
        <nav class="sidebar-nav">
            <a href="association-dashbord.html" class="sidebar-nav-item"><i>📊</i> <span>Dashboard</span></a>
            <a href="my-vehicles.html" class="sidebar-nav-item active"><i>🚐</i> <span>My Vehicles</span></a>
            <a href="drivers.html" class="sidebar-nav-item"><i>👨‍✈️</i> <span>Drivers</span></a>
            <a href="register-driver.html" class="sidebar-nav-item"><i>➕</i> <span>Register Driver</span></a>
            <a href="trip-history.html" class="sidebar-nav-item"><i>📅</i> <span>Trip History</span></a>
            <a href="reports.html" class="sidebar-nav-item"><i>📊</i> <span>Reports</span></a>
            <a href="#" class="sidebar-nav-item" id="logout-btn"><i>🚪</i> <span>Logout</span></a>
        </nav>
    </div>

    <div class="main-content">
        <div class="top-header">
            <button class="menu-toggle" id="sidebar-toggle">☰</button>
            <div class="header-right">
                <div class="notification-icon">🔔<span class="notification-badge" id="notification-badge">0</span>
                    <div class="notification-dropdown" id="notifications-dropdown"></div>
                </div>
                <div class="user-profile"><div class="user-avatar" id="user-avatar">A</div></div>
            </div>
        </div>

        <div class="content-area">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <h1 class="page-title">My Vehicles</h1>
                <button class="btn btn-primary" onclick="openAddVehicleModal()">➕ Register New Vehicle</button>
            </div>

            <!-- Statistics -->
            <div class="stats-grid">
                <div class="stat-card"><div class="stat-info"><h3 id="total-vehicles">--</h3><p>Total Vehicles</p></div></div>
                <div class="stat-card"><div class="stat-info"><h3 id="active-vehicles">--</h3><p>Active</p></div></div>
                <div class="stat-card"><div class="stat-info"><h3 id="maintenance-vehicles">--</h3><p>In Maintenance</p></div></div>
            </div>

            <!-- Vehicles Grid -->
            <div class="card">
                <div id="vehicles-container">
                    <div class="loading-spinner">Loading vehicles...</div>
                </div>
            </div>
        </div>
    </div>

    <!-- Add/Edit Vehicle Modal -->
    <div id="vehicle-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modal-title">Register New Vehicle</h3>
                <button class="modal-close" onclick="closeModal()">&times;</button>
            </div>
            <form id="vehicle-form">
                <input type="hidden" id="vehicle-id">
                <div class="form-group"><label>Registration Number *</label><input type="text" id="registration-number" required></div>
                <div class="form-group"><label>Owner Name *</label><input type="text" id="owner-name" required></div>
                <div class="form-group"><label>Owner Phone *</label><input type="tel" id="owner-phone" required></div>
                <div class="form-group"><label>Capacity (seats) *</label><input type="number" id="capacity" value="30" required></div>
                <div class="form-group"><label>Status</label>
                    <select id="status">
                        <option value="active">Active</option>
                        <option value="maintenance">Maintenance</option>
                        <option value="inactive">Inactive</option>
                    </select>
                </div>
                <div style="display: flex; gap: 10px; justify-content: flex-end;">
                    <button type="button" class="btn" onclick="closeModal()">Cancel</button>
                    <button type="submit" class="btn btn-primary">Save Vehicle</button>
                </div>
            </form>
        </div>
    </div>

    <div id="toast-container"></div>

    <script src="../../dalachap_dashboard/assets/js/config.js?v=2"></script>
    <script src="../../dalachap_dashboard/assets/js/auth.js?v=2"></script>
    <script src="../../dalachap_dashboard/assets/js/common.js?v=2"></script>
    <script src="../../dalachap_dashboard/assets/js/association.js?v=2"></script>
    
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            if (!requireRole(['association_leader', 'admin'])) return;
            initCommon();
            loadMyVehicles();
        });

        function openAddVehicleModal() {
            document.getElementById('modal-title').textContent = 'Register New Vehicle';
            document.getElementById('vehicle-form').reset();
            document.getElementById('vehicle-id').value = '';
            document.getElementById('capacity').value = '30';
            document.getElementById('vehicle-modal').style.display = 'flex';
        }

        async function editVehicle(vehicleId) {
            const result = await apiRequest(`${API_ENDPOINTS.getVehicles}?vehicle_id=${vehicleId}`);
            if (result.success && result.data.vehicle) {
                const v = result.data.vehicle;
                document.getElementById('modal-title').textContent = 'Edit Vehicle';
                document.getElementById('vehicle-id').value = v.vehicle_id;
                document.getElementById('registration-number').value = v.registration_number;
                document.getElementById('owner-name').value = v.owner_name;
                document.getElementById('owner-phone').value = v.owner_phone;
                document.getElementById('capacity').value = v.capacity;
                document.getElementById('status').value = v.status;
                document.getElementById('vehicle-modal').style.display = 'flex';
            }
        }

        document.getElementById('vehicle-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const vehicleData = {
                registration_number: document.getElementById('registration-number').value,
                owner_name: document.getElementById('owner-name').value,
                owner_phone: document.getElementById('owner-phone').value,
                capacity: parseInt(document.getElementById('capacity').value),
                status: document.getElementById('status').value
            };
            
            const vehicleId = document.getElementById('vehicle-id').value;
            let result;
            
            if (vehicleId) {
                vehicleData.vehicle_id = vehicleId;
                result = await apiRequest(API_ENDPOINTS.updateVehicle, 'POST', vehicleData);
            } else {
                result = await apiRequest(API_ENDPOINTS.addVehicle, 'POST', vehicleData);
            }
            
            if (result.success) {
                showToast(vehicleId ? 'Vehicle updated successfully' : 'Vehicle registered successfully', 'success');
                closeModal();
                loadMyVehicles();
                loadDashboardStats();
            } else {
                showToast(result.message, 'error');
            }
        });

        async function deleteVehicle(vehicleId) {
            if (confirm('Are you sure you want to delete this vehicle?')) {
                const result = await apiRequest(API_ENDPOINTS.deleteVehicle, 'POST', { vehicle_id: vehicleId });
                if (result.success) {
                    showToast('Vehicle deleted successfully', 'success');
                    loadMyVehicles();
                    loadDashboardStats();
                } else {
                    showToast(result.message, 'error');
                }
            }
        }

        function closeModal() {
            document.getElementById('vehicle-modal').style.display = 'none';
        }
    </script>
</body>
</html>
