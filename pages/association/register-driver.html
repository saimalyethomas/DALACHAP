<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DalaChap - Register Driver</title>
    <link rel="stylesheet" href="../../dalachap_dashboard/assets/css/style.css">
    <link rel="stylesheet" href="../../dalachap_dashboard/assets/css/dashboard.css">
    <link rel="stylesheet" href="../../dalachap_dashboard/assets/css/mobile-responsive.css">
</head>
<body>
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header"><h3>🚌 DalaChap</h3></div>
        <nav class="sidebar-nav">
            <a href="association-dashbord.html" class="sidebar-nav-item"><i>📊</i> <span>Dashboard</span></a>
            <a href="my-vehicles.html" class="sidebar-nav-item"><i>🚐</i> <span>My Vehicles</span></a>
            <a href="drivers.html" class="sidebar-nav-item"><i>👨‍✈️</i> <span>Drivers</span></a>
            <a href="register-driver.html" class="sidebar-nav-item active"><i>➕</i> <span>Register Driver</span></a>
            <a href="trip-history.html" class="sidebar-nav-item"><i>📅</i> <span>Trip History</span></a>
            <a href="reports.html" class="sidebar-nav-item"><i>📊</i> <span>Reports</span></a>
            <a href="#" class="sidebar-nav-item" id="logout-btn"><i>🚪</i> <span>Logout</span></a>
        </nav>
    </div>

    <div class="main-content">
        <div class="top-header">
            <button class="menu-toggle" id="sidebar-toggle">☰</button>
            <div class="header-right">
                <div class="notification-icon">🔔<span class="notification-badge" id="notification-badge">0</span>
                    <div class="notification-dropdown" id="notifications-dropdown"></div>
                </div>
                <div class="user-profile"><div class="user-avatar" id="user-avatar">A</div></div>
            </div>
        </div>

        <div class="content-area">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <h1 class="page-title">Register New Driver</h1>
                <a href="drivers.html" class="btn">← Back to Drivers</a>
            </div>

            <div class="card" style="max-width: 700px;">
                <form id="register-driver-form">
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                        <div class="form-group">
                            <label>Full Name *</label>
                            <input type="text" id="full-name" placeholder="e.g. Juma Hassan" required>
                        </div>
                        <div class="form-group">
                            <label>Email *</label>
                            <input type="email" id="email" placeholder="e.g. juma@driver.co.tz" required>
                        </div>
                        <div class="form-group">
                            <label>Phone Number *</label>
                            <input type="tel" id="phone" placeholder="e.g. 0712345678" required>
                        </div>
                        <div class="form-group">
                            <label>Password *</label>
                            <input type="password" id="password" placeholder="Min 6 characters" required>
                        </div>
                        <div class="form-group">
                            <label>License Number</label>
                            <input type="text" id="license-number" placeholder="e.g. DL-123456">
                        </div>
                    </div>
                    <div style="display: flex; gap: 10px; margin-top: 20px;">
                        <button type="submit" class="btn btn-primary">👨‍✈️ Register Driver</button>
                        <button type="reset" class="btn">Clear Form</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <div id="toast-container"></div>

    <script src="../../dalachap_dashboard/assets/js/config.js?v=2"></script>
    <script src="../../dalachap_dashboard/assets/js/auth.js?v=2"></script>
    <script src="../../dalachap_dashboard/assets/js/common.js?v=2"></script>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            if (!requireRole(['association_leader', 'admin'])) return;
            initCommon();
        });

        document.getElementById('register-driver-form').addEventListener('submit', async (e) => {
            e.preventDefault();

            const password = document.getElementById('password').value;
            if (password.length < 6) {
                showToast('Password must be at least 6 characters', 'error');
                return;
            }

            const data = {
                full_name: document.getElementById('full-name').value.trim(),
                email: document.getElementById('email').value.trim(),
                phone: document.getElementById('phone').value.trim(),
                password: password,
                license_number: document.getElementById('license-number').value.trim(),
                role: 'driver'
            };

            const result = await apiRequest(API_ENDPOINTS.addUser, 'POST', data);

            if (result.success) {
                showToast('Driver registered successfully!', 'success');
                document.getElementById('register-driver-form').reset();
                setTimeout(() => {
                    window.location.href = 'drivers.html';
                }, 1500);
            } else {
                showToast(result.message || 'Failed to register driver', 'error');
            }
        });
    </script>
</body>
</html>
